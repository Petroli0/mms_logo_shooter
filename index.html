<head>

    .dmg-text.fade{transform:translateY(-40px)!important;opacity:0}

<body>
<div id="hud">

</div>

</div>
<div id="hint">Клик — стрелять в направлении мыши · Скролл — зум · Перетаскивание ПКМ — вращение · R — респавн</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import * as CANNON from 'cannon-es';

// ═══ CONFIG ══════════════════════════════════════════════════════════════════
const FOLDERS = [
  'm-logo','i-delivery','i-device','i-education','i-factory','i-gear',
  'i-like','i-mri','i-request','i-sale','i-service','i-solution',
  'i-testing','i-time','likeford'
];
const BUBBLE_N = 30, SHARD_N = 12, ARENA = 28;
const PROJ_SPEED = 60, PROJ_R = 0.18, PROJ_MASS = 1.5;
const HIT_HP = 3;
const METEOR_INTERVAL = 3;

// ═══ RENDERER ════════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ═══ SCENE / CAMERA ══════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.008);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 5, 35);

// ═══ ORBIT CONTROLS (free cursor) ════════════════════════════════════════════
const orbitCtrl = new OrbitControls(camera, renderer.domElement);
orbitCtrl.enableDamping = true;
orbitCtrl.dampingFactor = 0.07;
orbitCtrl.enablePan = false;
orbitCtrl.minDistance = 10;
orbitCtrl.maxDistance = 60;
orbitCtrl.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
orbitCtrl.autoRotate = true;
orbitCtrl.autoRotateSpeed = 0.3;

// ═══ LIGHTS ══════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x8899cc, 2.0));
const dl = new THREE.DirectionalLight(0xffffff, 1.5);
dl.position.set(8, 15, 10);
scene.add(dl);
[[0x4466ff,3,-14,12,8],[0xff5599,2.5,14,-8,10],[0x44ffcc,2,0,-12,-8],[0xaa66ff,2.5,8,10,-12]].forEach(([c,i,x,y,z])=>{
  const l=new THREE.PointLight(c,i,70);l.position.set(x,y,z);scene.add(l);
});

// ═══ STARS ═══════════════════════════════════════════════════════════════════
{
  const N=5000,p=new Float32Array(N*3);
  for(let i=0;i<N*3;i++) p[i]=(Math.random()-.5)*250;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xaabbdd,size:.08,transparent:true,opacity:.6})));
}

// Arena wireframe
scene.add(new THREE.Mesh(
  new THREE.IcosahedronGeometry(ARENA,2),
  new THREE.MeshBasicMaterial({color:0x223355,wireframe:true,transparent:true,opacity:0.06})
));

// ═══ POST-PROCESSING ═════════════════════════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.35, 0.5, 0.85));

// ═══ PHYSICS ═════════════════════════════════════════════════════════════════
const world = new CANNON.World({gravity: new CANNON.Vec3(0, -1.5, 0)});
world.broadphase = new CANNON.SAPBroadphase(world);
const bMat = new CANNON.Material('b');
const pMat = new CANNON.Material('p');
const sMat = new CANNON.Material('s');
const mMat = new CANNON.Material('m');
world.addContactMaterial(new CANNON.ContactMaterial(bMat,bMat,{restitution:.75,friction:.1}));
world.addContactMaterial(new CANNON.ContactMaterial(bMat,pMat,{restitution:.3,friction:.05}));
world.addContactMaterial(new CANNON.ContactMaterial(sMat,sMat,{restitution:.4,friction:.3}));
world.addContactMaterial(new CANNON.ContactMaterial(bMat,mMat,{restitution:.9,friction:.05}));

// ═══ TEXTURES ════════════════════════════════════════════════════════════════
const spriteMats = [];
const totalTex = FOLDERS.length;
let loadedTex = 0;
const loadFill = document.getElementById('loadFill');

function loadAllTextures() {
  return new Promise(resolve => {
    FOLDERS.forEach((folder, fi) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const size = 512;
        const cv = document.createElement('canvas');
        cv.width = cv.height = size;
        const c = cv.getContext('2d');
        c.drawImage(img, 0, 0, size, size);
        const tex = new THREE.CanvasTexture(cv);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.needsUpdate = true;
        spriteMats[fi] = new THREE.SpriteMaterial({
          map: tex, transparent: true, depthTest: true, depthWrite: false, sizeAttenuation: true,
        });
        bump();
      };
      img.onerror = () => { spriteMats[fi] = null; bump(); };
      img.src = folder + '/01.png';
    });
    function bump() {
      loadedTex++;
      loadFill.style.width = (loadedTex/totalTex*100)+'%';
      if (loadedTex === totalTex) resolve();
    }
  });
}

// ═══ GEOMETRIES ══════════════════════════════════════════════════════════════
const sphereGeo = new THREE.SphereGeometry(1, 48, 24);
const shardGeos = [
  new THREE.TetrahedronGeometry(1,0),
  new THREE.OctahedronGeometry(1,0),
  new THREE.DodecahedronGeometry(.8,0),
];
const projGeo = new THREE.SphereGeometry(PROJ_R, 12, 12);
const meteorGeo = new THREE.DodecahedronGeometry(1, 1);

// ═══ GLASS SHADER ════════════════════════════════════════════════════════════
const glassVert = `
  varying vec3 vN; varying vec3 vV;
  void main(){
    vec4 mv = modelViewMatrix * vec4(position,1.0);
    vN = normalize(normalMatrix * normal);
    vV = normalize(-mv.xyz);
    gl_Position = projectionMatrix * mv;
  }
`;
const glassFrag = `
  uniform vec3 uColor; uniform float uOpacity;
  varying vec3 vN; varying vec3 vV;
  void main(){
    float f = pow(1.0 - abs(dot(vN,vV)), 3.0);
    float rim = smoothstep(0.0,1.0,f);
    vec3 col = uColor + vec3(0.5)*rim;
    float a = mix(0.03, uOpacity, rim);
    gl_FragColor = vec4(col, a);
  }
`;
function makeGlass(color, op){
  return new THREE.ShaderMaterial({
    uniforms:{uColor:{value:color},uOpacity:{value:op}},
    vertexShader:glassVert, fragmentShader:glassFrag,
    transparent:true, depthWrite:false, side:THREE.FrontSide,
  });
}

// ═══ HP BAR (canvas texture on sprite) ═══════════════════════════════════════
function makeHpBar(){
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 16;
  const tex = new THREE.CanvasTexture(cv);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false, sizeAttenuation:true});
  const sp = new THREE.Sprite(mat);
  return {canvas:cv, tex, sprite:sp, mat};
}

function drawHpBar(hpBar, hp, maxHp){
  const cv = hpBar.canvas;
  const c = cv.getContext('2d');
  c.clearRect(0,0,cv.width,cv.height);
  const pct = hp/maxHp;
  // bg
  c.fillStyle = 'rgba(0,0,0,0.5)';
  c.beginPath(); c.roundRect(0,0,cv.width,cv.height,4); c.fill();
  // fill
  const hue = pct > .5 ? 120 : pct > .25 ? 40 : 0;
  c.fillStyle = `hsl(${hue},80%,55%)`;
  c.beginPath(); c.roundRect(2,2,(cv.width-4)*pct,cv.height-4,3); c.fill();
  hpBar.tex.needsUpdate = true;
}

// ═══ BUBBLES ═════════════════════════════════════════════════════════════════
const HUE = [.58,.72,.50,.83,.63,.53,.75,.56,.67,.60,.55,.78,.48,.65,.70];
const bubbles = [];

function spawnBubble(idx){
  const fi = idx % FOLDERS.length;
  const r = 1.2 + Math.random()*.7;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const dist = 4 + Math.random()*(ARENA-8);
  const x = dist*Math.sin(phi)*Math.cos(theta);
  const y = dist*Math.sin(phi)*Math.sin(theta);
  const z = dist*Math.cos(phi);

  const hue = HUE[fi%HUE.length]+(Math.random()-.5)*.06;
  const color = new THREE.Color().setHSL(hue,.6,.7);
  const group = new THREE.Group();
  group.position.set(x,y,z);

  // Logo sprite
  let sprite = null;
  if(spriteMats[fi]){
    sprite = new THREE.Sprite(spriteMats[fi].clone());
    sprite.scale.set(r*1.8, r*1.8, 1);
    sprite.renderOrder = 0;
    group.add(sprite);
  }

  // Glass shell
  const glass = new THREE.Mesh(sphereGeo, makeGlass(color, 0.45));
  glass.scale.setScalar(r);
  glass.renderOrder = 2;
  group.add(glass);

  // HP bar
  const hpBar = makeHpBar();
  hpBar.sprite.scale.set(r*1.6, r*0.25, 1);
  hpBar.sprite.position.set(0, r*1.3, 0);
  hpBar.sprite.renderOrder = 3;
  drawHpBar(hpBar, HIT_HP, HIT_HP);
  group.add(hpBar.sprite);

  scene.add(group);

  const body = new CANNON.Body({
    mass: r*r*1.5,
    shape: new CANNON.Sphere(r),
    position: new CANNON.Vec3(x,y,z),
    material: bMat,
    linearDamping:.2, angularDamping:.5,
  });
  body.velocity.set((Math.random()-.5)*3,(Math.random()-.5)*3,(Math.random()-.5)*3);
  world.addBody(body);

  const b = {group,body,r,hue,color,fi,alive:true,hp:HIT_HP,phase:Math.random()*Math.PI*2,sprite,glass,hpBar};
  bubbles.push(b);
  return b;
}

// ═══ HIT BUBBLE (not kill — knockback + HP) ══════════════════════════════════
function hitBubble(bubble, projVel, projPos){
  bubble.hp--;
  drawHpBar(bubble.hpBar, bubble.hp, HIT_HP);

  // Compute impulse direction: from projectile toward bubble center
  const dir = new CANNON.Vec3(
    bubble.body.position.x - projPos.x,
    bubble.body.position.y - projPos.y,
    bubble.body.position.z - projPos.z
  );
  dir.normalize();

  // Impulse magnitude based on projectile momentum
  const speed = Math.sqrt(projVel.x**2 + projVel.y**2 + projVel.z**2);
  const impulse = dir.scale(PROJ_MASS * speed * 0.4);
  bubble.body.applyImpulse(impulse);

  // Also add spin from off-center hit
  const cross = new CANNON.Vec3();
  dir.cross(new CANNON.Vec3(projVel.x, projVel.y, projVel.z).unit(), cross);
  cross.scale(speed * 0.15, cross);
  bubble.body.angularVelocity.vadd(cross, bubble.body.angularVelocity);

  // Flash the glass
  bubble.glass.material.uniforms.uOpacity.value = 0.9;

  // Damage number popup
  spawnDmgText(bubble);

  if(bubble.hp <= 0){
    explodeBubble(bubble, projVel);
  }
}

// ═══ DAMAGE TEXT POPUP ═══════════════════════════════════════════════════════
function spawnDmgText(bubble){
  const v = bubble.group.position.clone().project(camera);
  const sx = (v.x * .5 + .5) * innerWidth;
  const sy = (-v.y * .5 + .5) * innerHeight;
  const el = document.createElement('div');
  el.className = 'dmg-text';
  el.textContent = `-1`;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.transform = `translate(-50%,-50%)`;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('fade'));
  setTimeout(()=> el.remove(), 1100);
}

// ═══ SHARDS (explosion) ══════════════════════════════════════════════════════
const shards = [];

function explodeBubble(bubble, hitVel){
  const pos = bubble.group.position.clone();
  const r = bubble.r;
  bubble.alive = false;
  scene.remove(bubble.group);
  world.removeBody(bubble.body);

  for(let i=0;i<SHARD_N;i++){
    const sr = r*(.15+Math.random()*.25);
    const geo = shardGeos[Math.floor(Math.random()*shardGeos.length)];
    const mat = new THREE.MeshStandardMaterial({
      color: bubble.color.clone().offsetHSL(Math.random()*.1-.05,0,Math.random()*.2-.1),
      roughness:.3, metalness:.2, transparent:true, opacity:.85,
      emissive: bubble.color.clone(), emissiveIntensity:2,
    });
    const mesh = new THREE.Mesh(geo,mat);
    mesh.scale.setScalar(sr);
    mesh.position.copy(pos);
    scene.add(mesh);

    const dir = new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize();
    const speed = 8+Math.random()*14;
    const body = new CANNON.Body({
      mass:sr*sr*.5, shape:new CANNON.Sphere(sr*.6),
      position:new CANNON.Vec3(pos.x,pos.y,pos.z),
      material:sMat, linearDamping:.15, angularDamping:.3,
    });
    body.velocity.set(
      dir.x*speed+(hitVel?hitVel.x*.25:0),
      dir.y*speed+(hitVel?hitVel.y*.25:0),
      dir.z*speed+(hitVel?hitVel.z*.25:0)
    );
    body.angularVelocity.set((Math.random()-.5)*15,(Math.random()-.5)*15,(Math.random()-.5)*15);
    world.addBody(body);
    shards.push({mesh,body,life:3+Math.random()*2,mat});
  }

  spawnShockwave(pos, r*3, bubble.color);
  spawnFlash(pos, bubble.color);

  for(const ob of bubbles){
    if(!ob.alive||ob===bubble) continue;
    const d = ob.body.position.distanceTo(new CANNON.Vec3(pos.x,pos.y,pos.z));
    if(d<r*6){
      const dir=new CANNON.Vec3();
      ob.body.position.vsub(new CANNON.Vec3(pos.x,pos.y,pos.z),dir);
      dir.normalize(); dir.scale(Math.max(0,1-d/(r*6))*30,dir);
      ob.body.applyImpulse(dir);
    }
  }
}

// ═══ SHOCKWAVE ═══════════════════════════════════════════════════════════════
const shockwaves = [];
function spawnShockwave(pos,maxR,color){
  const geo=new THREE.RingGeometry(.1,.3,48);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.7,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(pos); mesh.lookAt(camera.position);
  scene.add(mesh);
  shockwaves.push({mesh,mat,geo,maxR,t:0});
}

// ═══ FLASH ═══════════════════════════════════════════════════════════════════
const flashes = [];
function spawnFlash(pos,color){
  const l=new THREE.PointLight(color,15,25);
  l.position.copy(pos); scene.add(l);
  flashes.push({l,life:.4});
}

// ═══ BLASTER TRAIL SHADER ═════════════════════════════════════════════════════
const trailVertSrc = `
  attribute float alpha;
  varying float vAlpha;
  void main(){
    vAlpha = alpha;
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    gl_Position = projectionMatrix * mv;
  }
`;
const trailFragSrc = `
  uniform vec3 uColor;
  varying float vAlpha;
  void main(){
    gl_FragColor = vec4(uColor, vAlpha);
  }
`;

const TRAIL_LEN = 60;

function makeTrail(startPos){
  const positions = new Float32Array(TRAIL_LEN * 3);
  const alphas    = new Float32Array(TRAIL_LEN);
  for(let i=0;i<TRAIL_LEN;i++){
    positions[i*3]   = startPos.x;
    positions[i*3+1] = startPos.y;
    positions[i*3+2] = startPos.z;
    alphas[i] = 0;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('alpha',    new THREE.BufferAttribute(alphas, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(0xff5533) } },
    vertexShader: trailVertSrc,
    fragmentShader: trailFragSrc,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const line = new THREE.Line(geo, mat);
  line.frustumCulled = false;
  return { line, geo, positions, alphas, head: 0, written: 0 };
}

function updateTrail(trail, newPos){
  const h = trail.head % TRAIL_LEN;
  trail.positions[h*3]   = newPos.x;
  trail.positions[h*3+1] = newPos.y;
  trail.positions[h*3+2] = newPos.z;
  trail.head++;
  trail.written = Math.min(trail.written + 1, TRAIL_LEN);

  for(let i=0; i<TRAIL_LEN; i++){
    const age = trail.head - 1 - i;
    if(age < 0 || age >= trail.written){
      trail.alphas[i] = 0;
    } else {
      const idx = (trail.head - 1 - (trail.written - 1 - i)) % TRAIL_LEN;
      const t = i / (trail.written - 1 || 1);
      trail.alphas[((trail.head - 1) % TRAIL_LEN - i + TRAIL_LEN) % TRAIL_LEN] = 0;
    }
  }

  // Simpler: just set alpha by distance from head
  for(let k=0; k<trail.written; k++){
    const idx = ((trail.head - 1 - k) % TRAIL_LEN + TRAIL_LEN) % TRAIL_LEN;
    trail.alphas[idx] = Math.max(0, 1.0 - k / (TRAIL_LEN * 0.7));
  }
  for(let k=trail.written; k<TRAIL_LEN; k++){
    const idx = ((trail.head - 1 - k) % TRAIL_LEN + TRAIL_LEN) % TRAIL_LEN;
    trail.alphas[idx] = 0;
  }

  trail.geo.attributes.position.needsUpdate = true;
  trail.geo.attributes.alpha.needsUpdate = true;
}

// ═══ PROJECTILES ═════════════════════════════════════════════════════════════
const projectiles = [];
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2();

function shoot(mx, my){
  mouseNDC.set((mx/innerWidth)*2-1, -(my/innerHeight)*2+1);
  raycaster.setFromCamera(mouseNDC, camera);
  const dir = raycaster.ray.direction.clone().normalize();
  const pos = camera.position.clone().add(dir.clone().multiplyScalar(2));

  // Bolt mesh — elongated in flight direction
  const boltGeo = new THREE.CylinderGeometry(PROJ_R*0.6, PROJ_R*0.3, 0.8, 8);
  boltGeo.rotateX(Math.PI/2);
  const boltMat = new THREE.MeshBasicMaterial({color:0xff4444});
  const mesh = new THREE.Mesh(boltGeo, boltMat);
  mesh.position.copy(pos);
  mesh.lookAt(pos.clone().add(dir));
  scene.add(mesh);

  // Core glow
  const glow = new THREE.PointLight(0xff4422, 4, 8);
  mesh.add(glow);

  const body = new CANNON.Body({
    mass:PROJ_MASS, shape:new CANNON.Sphere(PROJ_R),
    position:new CANNON.Vec3(pos.x,pos.y,pos.z),
    material:pMat, collisionResponse:false,
  });
  const vel = dir.multiplyScalar(PROJ_SPEED);
  body.velocity.set(vel.x,vel.y,vel.z);
  world.addBody(body);

  // Blaster trail
  const trail = makeTrail(pos);
  scene.add(trail.line);

  projectiles.push({mesh,body,life:4,trail,dir:dir.clone().normalize()});
}

// ═══ METEORS ═════════════════════════════════════════════════════════════════
const meteors = [];
let meteorTimer = 2;

function spawnMeteor(){
  const r = 0.5 + Math.random()*1.2;

  // Spawn outside arena, aimed toward center area
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const spawnDist = ARENA + 10 + Math.random()*15;
  const sx = spawnDist*Math.sin(phi)*Math.cos(theta);
  const sy = spawnDist*Math.sin(phi)*Math.sin(theta);
  const sz = spawnDist*Math.cos(phi);

  // Target: random point near center
  const tx = (Math.random()-.5)*ARENA*.5;
  const ty = (Math.random()-.5)*ARENA*.5;
  const tz = (Math.random()-.5)*ARENA*.5;

  const dir = new THREE.Vector3(tx-sx, ty-sy, tz-sz).normalize();
  const speed = 15 + Math.random()*25;

  // Visual
  const mat = new THREE.MeshStandardMaterial({
    color: 0x886644,
    roughness: .6, metalness: .3,
    emissive: 0xff4400, emissiveIntensity: .8,
  });
  const mesh = new THREE.Mesh(meteorGeo, mat);
  mesh.scale.setScalar(r);
  mesh.position.set(sx,sy,sz);
  mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
  scene.add(mesh);

  // Fire trail
  const fireLight = new THREE.PointLight(0xff6622, 4, 10);
  mesh.add(fireLight);

  // Physics
  const body = new CANNON.Body({
    mass: r*r*r*5,
    shape: new CANNON.Sphere(r),
    position: new CANNON.Vec3(sx,sy,sz),
    material: mMat,
    linearDamping: 0, angularDamping: .1,
  });
  body.velocity.set(dir.x*speed, dir.y*speed, dir.z*speed);
  body.angularVelocity.set((Math.random()-.5)*8,(Math.random()-.5)*8,(Math.random()-.5)*8);
  body.collisionResponse = true;
  world.addBody(body);

  meteors.push({mesh,body,mat,life:8+Math.random()*4,r});
}

// ═══ LINES ═══════════════════════════════════════════════════════════════════
const maxP=BUBBLE_N*(BUBBLE_N-1)/2;
const lBuf=new Float32Array(maxP*6);
const lGeo=new THREE.BufferGeometry();
lGeo.setAttribute('position',new THREE.BufferAttribute(lBuf,3));
scene.add(new THREE.LineSegments(lGeo,new THREE.LineBasicMaterial({color:0x5577aa,transparent:true,opacity:.14})));

function updateLines(){
  let vi=0;
  const alive=bubbles.filter(b=>b.alive);
  for(let i=0;i<alive.length;i++)for(let j=i+1;j<alive.length;j++){
    const d=alive[i].group.position.distanceTo(alive[j].group.position);
    if(d<6){const a=alive[i].group.position,b=alive[j].group.position;lBuf[vi++]=a.x;lBuf[vi++]=a.y;lBuf[vi++]=a.z;lBuf[vi++]=b.x;lBuf[vi++]=b.y;lBuf[vi++]=b.z;}
  }
  lGeo.setDrawRange(0,vi/3);
  lGeo.attributes.position.needsUpdate=true;
}

// ═══ CONTROLS ════════════════════════════════════════════════════════════════
document.addEventListener('mousedown', e => {
  if(e.button === 0) shoot(e.clientX, e.clientY);
});

const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='KeyR') respawnAll(); });
document.addEventListener('keyup', e => keys[e.code]=false);

function respawnAll(){
  for(const b of bubbles) if(b.alive){scene.remove(b.group);world.removeBody(b.body);}
  bubbles.length=0;
  for(let i=0;i<BUBBLE_N;i++) spawnBubble(i);
  updateBallCount();
}

// ═══ HUD ═════════════════════════════════════════════════════════════════════
let score=0, comboN=0, comboT=0;
const scoreEl=document.getElementById('scoreVal');
const ballEl=document.getElementById('ballCount');
const comboEl=document.getElementById('combo');

function addScore(pts){
  comboN++; comboT=2;
  const m=Math.min(comboN,8);
  score+=pts*m; scoreEl.textContent=score;
  if(m>1){comboEl.textContent=`x${m} COMBO!`;comboEl.classList.add('show');}
}
function updateBallCount(){ballEl.textContent=bubbles.filter(b=>b.alive).length;}

// ═══ HIT DETECTION ═══════════════════════════════════════════════════════════
function checkHits(){
  for(let pi=projectiles.length-1;pi>=0;pi--){
    const p=projectiles[pi], pp=p.body.position;
    for(const b of bubbles){
      if(!b.alive) continue;
      if(pp.distanceTo(b.body.position) < b.r+PROJ_R){
        const pv = p.body.velocity;
        hitBubble(b, {x:pv.x,y:pv.y,z:pv.z}, {x:pp.x,y:pp.y,z:pp.z});
        if(!b.alive) { addScore(100); updateBallCount(); }
        scene.remove(p.mesh);scene.remove(p.trail);world.removeBody(p.body);
        projectiles.splice(pi,1);
        break;
      }
    }
  }
}

// ═══ RESIZE ══════════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

// ═══ LOOP ════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(),.05);
  const t = clock.elapsedTime;

  orbitCtrl.update();

  // Arena boundary force
  for(const b of bubbles){
    if(!b.alive) continue;
    const d=b.body.position.length();
    if(d+b.r>ARENA){
      const dir=new CANNON.Vec3(-b.body.position.x,-b.body.position.y,-b.body.position.z);
      dir.normalize(); dir.scale(15*(d+b.r-ARENA),dir);
      b.body.applyForce(dir);
    }
  }

  // Meteor spawning
  meteorTimer -= dt;
  if(meteorTimer <= 0){
    spawnMeteor();
    meteorTimer = METEOR_INTERVAL + (Math.random()-.5)*2;
  }

  world.step(1/60, dt, 3);

  // Sync bubbles
  for(const b of bubbles){
    if(!b.alive) continue;
    b.group.position.copy(b.body.position);
    b.group.scale.setScalar(1+Math.sin(t*1.1+b.phase)*.02);
    // HP bar always faces camera
    b.hpBar.sprite.quaternion.copy(camera.quaternion);
    // Restore glass opacity after hit flash
    const u = b.glass.material.uniforms.uOpacity;
    if(u.value > 0.45) u.value += (0.45 - u.value) * 0.05;
  }

  // Projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.mesh.position.copy(p.body.position);
    p.mesh.lookAt(p.mesh.position.clone().add(p.dir));
    p.life-=dt;
    updateTrail(p.trail, new THREE.Vector3(p.body.position.x, p.body.position.y, p.body.position.z));
    if(p.life<=0||p.body.position.length()>ARENA+15){
      scene.remove(p.mesh);scene.remove(p.trail.line);world.removeBody(p.body);
      p.trail.geo.dispose(); p.trail.line.material.dispose();
      projectiles.splice(i,1);
    }
  }

  // Meteors
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.mesh.position.copy(m.body.position);
    m.mesh.quaternion.copy(m.body.quaternion);
    m.life-=dt;
    if(m.life<=0 || m.body.position.length()>ARENA*2.5){
      scene.remove(m.mesh);world.removeBody(m.body);m.mat.dispose();meteors.splice(i,1);
    }
  }

  // Shards
  for(let i=shards.length-1;i>=0;i--){
    const s=shards[i];
    s.mesh.position.copy(s.body.position);
    s.mesh.quaternion.copy(s.body.quaternion);
    s.life-=dt;
    s.mat.opacity=Math.max(0,s.life/2);
    s.mat.emissiveIntensity=Math.max(0,s.life*.8);
    if(s.life<=0){scene.remove(s.mesh);world.removeBody(s.body);s.mat.dispose();shards.splice(i,1);}
  }

  // Shockwaves
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];
    sw.t+=dt*3;
    const p=Math.min(sw.t,1);
    sw.mesh.scale.setScalar(sw.maxR*p);
    sw.mat.opacity=.7*(1-p);
    sw.mesh.lookAt(camera.position);
    if(p>=1){scene.remove(sw.mesh);sw.geo.dispose();sw.mat.dispose();shockwaves.splice(i,1);}
  }

  // Flashes
  for(let i=flashes.length-1;i>=0;i--){
    const f=flashes[i];f.life-=dt;
    f.l.intensity=Math.max(0,f.life/.4)*15;
    if(f.life<=0){scene.remove(f.l);flashes.splice(i,1);}
  }

  // Combo
  if(comboT>0){comboT-=dt;if(comboT<=0){comboN=0;comboEl.classList.remove('show');}}

  checkHits();
  updateLines();
  composer.render();
}

// ═══ START ═══════════════════════════════════════════════════════════════════
const loadingEl = document.getElementById('loading');

loadAllTextures().then(()=>{
  for(let i=0;i<BUBBLE_N;i++) spawnBubble(i);
  updateBallCount();
  setTimeout(()=>{loadingEl.classList.add('done');setTimeout(()=>loadingEl.remove(),900);},200);
  animate();
});
</script>
